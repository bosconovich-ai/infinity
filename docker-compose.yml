services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-idea-factory}:local
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      APP_PORT: ${APP_PORT:-8000}
      IDEA_FACTORY_HOST: 0.0.0.0
      IDEA_STORAGE_ROOT: ${IDEA_STORAGE_ROOT:-/data/ideas}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-qwen/qwen3.5-397b-a17b}
      OPENROUTER_IDEATION_TEMPERATURE: ${OPENROUTER_IDEATION_TEMPERATURE:-1.15}
      AUTONOMOUS_GENERATION_PARALLEL_REQUESTS: ${AUTONOMOUS_GENERATION_PARALLEL_REQUESTS:-8}
      ENABLE_MARKET_SCRAPING: ${ENABLE_MARKET_SCRAPING:-1}
      MARKET_SIGNAL_LIMIT_PER_DOMAIN: ${MARKET_SIGNAL_LIMIT_PER_DOMAIN:-2}
      MARKET_SIGNAL_REFRESH_LIMIT_PER_DOMAIN: ${MARKET_SIGNAL_REFRESH_LIMIT_PER_DOMAIN:-8}
      MARKET_SIGNAL_REFRESH_INTERVAL_SECONDS: ${MARKET_SIGNAL_REFRESH_INTERVAL_SECONDS:-900}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    ports:
      - "127.0.0.1:${HOST_PORT:-18000}:${APP_PORT:-8000}"
    volumes:
      - ./ideas:${IDEA_STORAGE_ROOT:-/data/ideas}
    restart: unless-stopped
